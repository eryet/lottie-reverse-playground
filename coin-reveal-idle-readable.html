// =============================================
// EASING
// =============================================
function cubicBezier(x1, y1, x2, y2) {
  return function(t) {
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    let cx = 3*x1, bx = 3*(x2-x1)-cx, ax = 1-cx-bx;
    let cy = 3*y1, by = 3*(y2-y1)-cy, ay = 1-cy-by;
    function sX(tt) { return ((ax*tt+bx)*tt+cx)*tt; }
    function sY(tt) { return ((ay*tt+by)*tt+cy)*tt; }
    function solve(x) {
      let tt = x;
      for (let i = 0; i < 14; i++) {
        let ex = sX(tt) - x;
        if (Math.abs(ex) < 1e-7) return tt;
        let dx = (3*ax*tt+2*bx)*tt+cx;
        if (Math.abs(dx) < 1e-7) break;
        tt -= ex / dx;
      }
      // Fallback bisection
      let lo = 0, hi = 1;
      tt = x;
      while (lo < hi) {
        let mid = sX(tt);
        if (Math.abs(mid - x) < 1e-7) break;
        if (x > mid) lo = tt; else hi = tt;
        tt = (lo + hi) / 2;
      }
      return tt;
    }
    return sY(solve(t));
  };
}
function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function eased(startVal, endVal, t, easeFn) {
  const et = easeFn ? easeFn(clamp01(t)) : clamp01(t);
  return lerp(startVal, endVal, et);
}
function easedArr(s, e, t, easeFn) {
  const et = easeFn ? easeFn(clamp01(t)) : clamp01(t);
  return s.map((v, i) => lerp(v, e[i], et));
}

// =============================================
// LOTTIE BEZIER PATH DRAWING
// =============================================
// Lottie paths: v=vertices, i=in-tangents (relative), o=out-tangents (relative), c=closed
function appendBezierPath(ctx, v, i, o, closed) {
  if (!v || v.length === 0) return;
  ctx.moveTo(v[0][0], v[0][1]);
  for (let n = 1; n < v.length; n++) {
    const prev = n - 1;
    const cp1x = v[prev][0] + o[prev][0];
    const cp1y = v[prev][1] + o[prev][1];
    const cp2x = v[n][0] + i[n][0];
    const cp2y = v[n][1] + i[n][1];
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, v[n][0], v[n][1]);
  }
  if (closed) {
    const last = v.length - 1;
    const cp1x = v[last][0] + o[last][0];
    const cp1y = v[last][1] + o[last][1];
    const cp2x = v[0][0] + i[0][0];
    const cp2y = v[0][1] + i[0][1];
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, v[0][0], v[0][1]);
    ctx.closePath();
  }
}

function drawBezierPath(ctx, v, i, o, closed) {
  ctx.beginPath();
  appendBezierPath(ctx, v, i, o, closed);
}

// Interpolate between two shape keyframes
function lerpShape(s0, s1, t) {
  const v = s0.v.map((p, idx) => [lerp(p[0], s1.v[idx][0], t), lerp(p[1], s1.v[idx][1], t)]);
  const i = s0.i.map((p, idx) => [lerp(p[0], s1.i[idx][0], t), lerp(p[1], s1.i[idx][1], t)]);
  const o = s0.o.map((p, idx) => [lerp(p[0], s1.o[idx][0], t), lerp(p[1], s1.o[idx][1], t)]);
  return { v, i, o, c: s0.c };
}

function lerpValue(a, b, t) {
  if (Array.isArray(a)) return a.map((v, i) => lerpValue(v, b[i], t));
  return lerp(a, b, t);
}

function isKeyframedValue(value) {
  return Array.isArray(value) && value.length > 0 && typeof value[0] === 'object' && value[0] !== null && 't' in value[0];
}

function sampleAnimatedValue(value, frame) {
  if (!isKeyframedValue(value)) return value;
  if (frame <= value[0].t) return value[0].s;

  for (let i = 0; i < value.length - 1; i++) {
    const current = value[i];
    const next = value[i + 1];
    if (frame <= next.t) {
      if (current.h === 1) return current.s;
      let t = clamp01((frame - current.t) / Math.max(1e-6, next.t - current.t));
      if (current.o && current.i) {
        t = cubicBezier(current.o.x, current.o.y, current.i.x, current.i.y)(t);
      }
      return lerpValue(current.s, next.s, t);
    }
  }

  return value[value.length - 1].s;
}

function sampleScalar(value, frame) {
  const sampled = sampleAnimatedValue(value, frame);
  return Array.isArray(sampled) ? sampled[0] : sampled;
}

function applyLayerTransform(ctx, transform) {
  const p = transform.p || [0, 0];
  const a = transform.a || [0, 0];
  const s = transform.s || [100, 100];
  const r = transform.r || 0;

  ctx.translate(p[0], p[1]);
  ctx.rotate(r * Math.PI / 180);
  ctx.scale(s[0] / 100, s[1] / 100);
  ctx.translate(-a[0], -a[1]);
}

function makeGradient(ctx, spec) {
  const gradient = ctx.createLinearGradient(spec.s[0], spec.s[1], spec.e[0], spec.e[1]);
  for (let i = 0; i < spec.g.length; i += 4) {
    const stop = spec.g[i];
    const r = Math.round(spec.g[i + 1] * 255);
    const g = Math.round(spec.g[i + 2] * 255);
    const b = Math.round(spec.g[i + 3] * 255);
    gradient.addColorStop(stop, `rgb(${r}, ${g}, ${b})`);
  }
  return gradient;
}

function fillShape(ctx, shape, fillStyle) {
  ctx.fillStyle = fillStyle;
  drawBezierPath(ctx, shape.v, shape.i, shape.o, shape.c);
  ctx.fill();
}

function fillCompoundShapes(ctx, shapes, fillStyle, fillRule = 'nonzero') {
  ctx.beginPath();
  for (const shape of shapes) {
    appendBezierPath(ctx, shape.v, shape.i, shape.o, shape.c);
  }
  ctx.fillStyle = fillStyle;
  ctx.fill(fillRule);
}

function strokeShape(ctx, shape, strokeStyle, lineWidth) {
  ctx.strokeStyle = strokeStyle;
  ctx.lineWidth = lineWidth;
  drawBezierPath(ctx, shape.v, shape.i, shape.o, shape.c);
  ctx.stroke();
}

// =============================================
// DRAW COIN at a given internal frame (0-120, clamped)
// =============================================
function drawCoinAtFrame(ctx, localFrame) {
  const clampedFrame = Math.max(0, Math.min(119.999, localFrame));
  const segmentIdx = Math.min(7, Math.floor(clampedFrame / 15));
  const phaseT = coinSegmentEase((clampedFrame % 15) / 15);
  const isClosing = segmentIdx % 2 === 0;
  const dollarScaleY = (segmentIdx % 4 === 0 || segmentIdx % 4 === 3) ? 100 : -100;

  const ringTransform = isClosing
    ? { a: [540, 540], p: [540, 540], s: [100, lerp(100, 0, phaseT)] }
    : { a: [540, 540], p: [540, lerp(597, 540, phaseT)], s: [100, lerp(0, 100, phaseT)] };
  const capTransform = isClosing
    ? { a: [0, 0], p: [540, lerp(540, 568, phaseT)], s: [100, lerp(100, 0, phaseT)] }
    : { a: [0, 0], p: [540, lerp(568, 540, phaseT)], s: [100, lerp(0, 100, phaseT)] };

  const darkShape = isClosing
    ? lerpShape(edgeDark_start, edgeDark_end, phaseT)
    : lerpShape(edgeDarkOdd_start, edgeDarkOdd_end, phaseT);
  const lightShape = isClosing
    ? lerpShape(edgeLight_start, edgeLight_end, phaseT)
    : lerpShape(edgeLightOdd_start, edgeLightOdd_end, phaseT);

  const ringGradient = isClosing ? ringFaceGradClose : ringFaceGradOpen;
  const capGradient = isClosing ? capFaceGradClose : capFaceGradOpen;
  const darkGradient = isClosing ? darkEdgeGradClose : darkEdgeGradOpen;
  const lightGradient = isClosing ? lightEdgeGradClose : lightEdgeGradOpen;

  ctx.save();
  applyLayerTransform(ctx, capTransform);
  const capFill = makeGradient(ctx, capGradient);
  fillShape(ctx, capFace, capFill);
  strokeShape(ctx, capFace, CYAN_STROKE, STROKE_W);
  ctx.restore();

  ctx.save();
  ctx.translate(540, 657);
  fillShape(ctx, lightShape, makeGradient(ctx, lightGradient));
  ctx.restore();

  ctx.save();
  applyLayerTransform(ctx, capTransform);
  ctx.rotate(-45 * Math.PI / 180);
  ctx.scale(1, dollarScaleY / 100);
  fillCompoundShapes(ctx, [dollarOuter, dollarHole1, dollarHole2], '#ffffff', 'evenodd');
  ctx.restore();

  ctx.save();
  ctx.translate(539.73, 685.757);
  fillShape(ctx, darkShape, makeGradient(ctx, darkGradient));
  ctx.restore();

  ctx.save();
  applyLayerTransform(ctx, ringTransform);
  const ringFill = makeGradient(ctx, ringGradient);
  fillCompoundShapes(ctx, [ringFaceOuter, ringFaceInner], ringFill, 'evenodd');
  strokeShape(ctx, ringFaceInner, BLUE_STROKE, STROKE_W);
  strokeShape(ctx, ringFaceOuter, BLUE_STROKE, STROKE_W);
  ctx.restore();
}

  v: [[69.008,31.61],[-31.61,69.008],[-69.008,-31.61],[31.61,-69.008]],
  i: [[-42.446,-33.607],[33.607,-42.446],[42.446,33.607],[-33.607,42.446]],
  o: [[-53.172,-10.192],[10.192,-53.172],[53.172,10.192],[-10.192,53.172]],
  c: true,
};

const easePos = cubicBezier(0, 0, 0, 1);
const easeScaleIn = cubicBezier(0.333, 0, 0.667, 1);
const easeRot = cubicBezier(0.333, 0, 0.054, 1);

const particles = [
  { appearFrame:18, scaleEndFrame:32, endFrame:167, startPos:[531.288,546.913], endPos:[195.288,458.913], startRotation:482, endRotation:0, color:'#70f4a6', shape:star24Shape },
  { appearFrame:54, scaleEndFrame:68, endFrame:203, startPos:[527.31,538.603], endPos:[754.81,260.103], startRotation:-300, endRotation:0, color:'#70f4a6', shape:diamond8Shape },
  { appearFrame:45, scaleEndFrame:59, endFrame:194, startPos:[532.167,547.805], endPos:[620.167,317.805], startRotation:-276, endRotation:0, color:'#a1a1fb', shape:diamond4smShape },
  { appearFrame:36, scaleEndFrame:50, endFrame:185, startPos:[531.643,542.499], endPos:[418.643,842.499], startRotation:321, endRotation:0, color:'#3094e8', shape:diamond4sm2Shape },
  { appearFrame:9,  scaleEndFrame:23, endFrame:158, startPos:[530.245,547.039], endPos:[315.245,280.039], startRotation:327, endRotation:0, color:'#3094e8', shape:diamond4lgShape },
  { appearFrame:27, scaleEndFrame:41, endFrame:176, startPos:[534.698,547.338], endPos:[749.698,805.338], startRotation:-211, endRotation:0, color:'#a1a1fb', shape:diamond4xlShape },
];

// =============================================
// COIN LAYERS
// =============================================
// Keyframe format (standard Lottie conventions):
//   t = frame number (time)
//   s = start value at this keyframe
//   o = out-tangent (bezier easing control point)
//   i = in-tangent (bezier easing control point)
//   h = hold (1 = hold value until next keyframe, no interpolation)
const coinLayerMain = {
  inPoint: 0,
  outPoint: 727,
  position: [540, 540],
  scale: [
    { o: { x: 0.333, y: 0 }, i: { x: -0.333, y: 1 }, s: [70, 70, 100], t: 0 },
    { s: [88, 88, 88], t: 180.999 },
  ],
  rotation: [
    { o: { x: 0.333, y: 0 }, i: { x: 0, y: 1 }, s: [-314], t: 0 },
    { s: [43.571], t: 180.999 },
  ],
  timeRemap: [
    { o: { x: 0.333, y: 0 }, i: { x: 0.667, y: 1 }, s: [0], t: -7 },
    { o: { x: 0.408, y: 0 }, i: { x: 0.225, y: 0.997 }, s: [0.117], t: 0 },
    { s: [1.909], t: 180.999 },

};

  inPoint: 0,
  outPoint: 120,

const coinRenderOrder = [coinLayer2, coinLayer3, coinLayerMain, coinLayer4];

// =============================================
// RENDER
// =============================================
let frame = 0;
let lastTime = 0;
const frameDur = 1000 / FPS;

// Use offscreen canvas for coin compositing (destination-out needs isolation)
const coinCanvas = document.createElement('canvas');
coinCanvas.width = 1080;
coinCanvas.height = 1080;
const coinCtx = coinCanvas.getContext('2d');

function renderCoinIsolated(localFrame) {
  coinCtx.clearRect(0, 0, 1080, 1080);
  drawCoinAtFrame(coinCtx, localFrame);
}

function renderCoinLayer(layer, frame) {
  if (frame < layer.inPoint || frame >= layer.outPoint) return;

  const position = sampleAnimatedValue(layer.position, frame);
  const scale = sampleAnimatedValue(layer.scale, frame);
  const rotation = sampleScalar(layer.rotation, frame);
  const timeRemap = sampleScalar(layer.timeRemap, frame);
  const coinFrame = Math.max(0, Math.min(119.999, timeRemap * FPS));

  renderCoinIsolated(coinFrame);

  ctx.save();
  ctx.translate(position[0], position[1]);
  ctx.rotate(rotation * Math.PI / 180);
  ctx.scale(scale[0] / 100, scale[1] / 100);
  ctx.drawImage(coinCanvas, -540, -540);
  ctx.restore();
}

function render(f) {
  ctx.clearRect(0, 0, W, H);

  // === Scatter particles (Layers 4-9) ===
  for (const p of particles) {
    if (f < p.appearFrame) continue;
    const duration = p.endFrame - p.appearFrame;
    const elapsed = f - p.appearFrame;
    const posT = clamp01(elapsed / duration);
    const scaleT = clamp01(elapsed / (p.scaleEndFrame - p.appearFrame));
    const rotT = clamp01(elapsed / duration);

    const px = eased(p.startPos[0], p.endPos[0], posT, easePos);
    const py = eased(p.startPos[1], p.endPos[1], posT, easePos);
    const scale = eased(0, 1, scaleT, easeScaleIn);
    const rotation = eased(p.startRotation, p.endRotation, rotT, easeRot);

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.scale(scale, scale);
    fillShape(ctx, p.shape, p.color);
    ctx.restore();
  }

  // === Coins (Layers 1-4, bottom-to-top order) ===
  for (const layer of coinRenderOrder) {
    renderCoinLayer(layer, f);
  }
}

function animate(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime;
  if (dt >= frameDur) {
    lastTime = ts - (dt % frameDur);
    render(frame);
    frame = (frame + 1) % TOTAL_FRAMES;
  }
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
