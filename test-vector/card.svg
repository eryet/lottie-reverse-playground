      <text x="60" y="7" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#ffffff">R</text>
    </g>
  </g>

  <g id="layer-flares" clip-path="url(#frameClip)">
    <ellipse cx="223" cy="281" rx="52" ry="8" fill="#faffff" opacity="0.75"/>
    <ellipse cx="175" cy="73" rx="58" ry="7" fill="#e1ffff" opacity="0.55"/>
    <ellipse cx="74" cy="254" rx="11" ry="36" fill="#f1ffff" opacity="0.2"/>
    <ellipse cx="420" cy="118" rx="7" ry="28" fill="#b0ffff" opacity="0.18"/>
  </g>
</svg>
