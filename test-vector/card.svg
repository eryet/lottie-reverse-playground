    <path d="M84 95 L96 83 H171 L183 72 H340 L353 82 H398 L419 104 V252 L400 271 H266 L255 281 H130 L117 269 H86 L72 255 V113 Z"
      fill="none" stroke="url(#frameInner)" stroke-width="2.2" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <g id="layer-atmosphere" clip-path="url(#frameClip)">
    <rect x="72" y="72" width="347" height="210" fill="url(#scanlines)"/>
    <ellipse cx="170" cy="170" rx="132" ry="112" fill="#97ffff" opacity="0.13"/>
    <ellipse cx="210" cy="210" rx="178" ry="145" fill="#18c9ff" opacity="0.12"/>
    <ellipse cx="316" cy="84" rx="62" ry="18" fill="#ffffff" opacity="0.22"/>
    <ellipse cx="223" cy="278" rx="54" ry="10" fill="#e5ffff" opacity="0.28"/>
    <path d="M73 252 C129 244, 183 248, 241 257" fill="none" stroke="#8cf9ff" stroke-width="1" opacity="0.3"/>
    <path d="M258 264 C296 261, 338 261, 366 266" fill="none" stroke="#a4ffff" stroke-width="1" opacity="0.3"/>
    <rect x="89" y="106" width="26" height="4" fill="#64f6ff" opacity="0.25"/>
  </g>

  <g id="layer-tech-accents" stroke-linecap="round" stroke-linejoin="round">
    <path d="M90 90 H172 L183 79 H338 L347 88 H392" fill="none" stroke="#c3ffff" stroke-width="1.8" opacity="0.7"/>
    <path d="M76 114 V250" fill="none" stroke="#a0ffff" stroke-width="1.2" opacity="0.35"/>
    <path d="M86 253 L95 262 H119" fill="none" stroke="#c6ffff" stroke-width="1.4" opacity="0.55"/>
    <path d="M267 273 H392 L409 255" fill="none" stroke="#dbffff" stroke-width="1.8" opacity="0.58"/>
    <path d="M356 89 L404 89 L432 117" fill="none" stroke="#9ff3ff" stroke-width="1.4" opacity="0.4"/>
    <path d="M311 255 h37" fill="none" stroke="#89e8ff" stroke-width="1.2" opacity="0.65"/>
    <path d="M127 265 h82" fill="none" stroke="#9ffbff" stroke-width="1" opacity="0.55"/>
    <path d="M93 234 h6 M104 234 h32 M141 234 h16 M162 234 h74" fill="none" stroke="#6fefff" stroke-width="0.9" opacity="0.28"/>
    <path d="M325 274 l7 -7 h9 l4 -4 h7 l5 -5 h8 l5 -5 h8" fill="none" stroke="#a4ffff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="408" cy="250" r="10.5" fill="none" stroke="#57dfff" stroke-width="1" opacity="0.35"/>
    <circle cx="408" cy="250" r="3.5" fill="#7df7ff" opacity="0.25"/>
    <circle cx="90" cy="222" r="2.5" fill="#8efcff" opacity="0.25"/>
    <circle cx="90" cy="236" r="5" fill="none" stroke="#73efff" stroke-width="0.9" opacity="0.18"/>
    <circle cx="101" cy="243" r="11" fill="none" stroke="#82f6ff" stroke-width="0.6" opacity="0.13"/>
  </g>

  <g id="layer-text-level" filter="url(#softShadow)">
    <text x="145" y="132" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="33" font-style="italic"
      fill="#324162" opacity="0.95">LEVEL 0</text>
    <text x="143" y="129" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="33" font-style="italic"
      fill="url(#textFill)">LEVEL 0</text>
  </g>

  <g id="layer-text-title" filter="url(#softShadow)">
    <text x="110" y="189" font-family="'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif" font-size="36"
      font-weight="700" fill="#314062">實習艦長</text>
    <text x="108" y="186" font-family="'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif" font-size="36"
      font-weight="700" fill="#ffffff">實習艦長</text>
  </g>

  <g id="layer-panel" transform="translate(303 84)" filter="url(#panelShadow)">
    <rect x="0" y="0" width="106" height="111" rx="10" fill="url(#metalBase)" stroke="#d5d5d5" stroke-width="1.2"/>
    <rect x="0" y="0" width="106" height="111" rx="10" fill="url(#metalGloss)"/>
    <path d="M12 20 H92" stroke="#ffffff" stroke-width="1" opacity="0.45"/>
    <path d="M12 28 H92" stroke="#8a8a8a" stroke-width="1" opacity="0.16"/>
    <path d="M12 37 H92" stroke="#ffffff" stroke-width="1" opacity="0.18"/>
    <path d="M12 78 H92" stroke="#7f7f7f" stroke-width="1" opacity="0.12"/>
    <rect x="3.5" y="3.5" width="99" height="104" rx="8" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.55"/>
    <g fill="#d9d9d9" stroke="#8c8c8c" stroke-width="0.9">
      <circle cx="8.5" cy="8.5" r="3.2"/>
      <circle cx="97.5" cy="8.5" r="3.2"/>
      <circle cx="8.5" cy="102.5" r="3.2"/>
      <circle cx="97.5" cy="102.5" r="3.2"/>
    </g>
    <g stroke="#888" stroke-width="0.8" opacity="0.9">
      <path d="M6.8 8.5 H10.2"/>
      <path d="M95.8 6.8 V10.2"/>
      <path d="M6.9 100.8 L10.1 104.1"/>
      <path d="M95.8 102.5 H99.2"/>
    </g>
  </g>

  <g id="layer-helmet-icon" transform="translate(356 136)">
    <g fill="none" stroke="#353535" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-1 -22 c17 0 30 13 30 30 v10 h-60 v-10 c0-17 13-30 30-30z" stroke-width="2.4"/>
      <path d="M-20 2 c1 -11 9 -19 20 -19 c8 0 15 4 18 10" stroke-width="1.9"/>
      <path d="M-10 14 h20 c4 0 7 -3 7 -7 v-3 c0 -4 -3 -7 -7 -7 h-14 c-8 0 -14 6 -14 14 v2 c0 1 1 1 1 1z" stroke-width="2"/>
      <path d="M-14 15 c4 3 10 4 16 4 h9" stroke-width="1.7"/>
      <path d="M24 -10 h8 v15 h-8" stroke-width="1.6"/>
      <path d="M32 -5 h6 v8 h-6" stroke-width="1.2"/>
      <path d="M-34 -6 h4 v18 h-4" stroke-width="1.4"/>
      <circle cx="-29" cy="3" r="3.2" stroke-width="1.3"/>
      <path d="M4 2 l7 -9" stroke-width="1.3"/>
      <path d="M14 19 v4" stroke-width="1.3"/>
      <path d="M-6 8 c3 -3 8 -4 12 -2" stroke-width="1.3"/>
    </g>
  </g>

  <g id="layer-logo" transform="translate(330 206)">
    <g filter="url(#softShadow)">
      <path d="M10 0 H46 C56 0 64 8 64 18 C64 28 56 36 46 36 H10 C0 36 -8 28 -8 18 C-8 8 0 0 10 0 Z"
        fill="#255fb2" stroke="#ffffff" stroke-width="2"/>
      <path d="M11 4 H45 C52 4 58 10 58 18 C58 26 52 32 45 32 H11 C4 32 -2 26 -2 18 C-2 10 4 4 11 4 Z"
